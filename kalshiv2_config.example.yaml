# KalshiV2 Bot Configuration
# Copy to kalshiv2_config.yaml and customize.

# Kalshi API credentials
kalshi:
  api_key: ""                    # Your Kalshi API key
  private_key_path: ""           # Path to RSA private key for signing
  demo_mode: true                # Use demo endpoint (no real money)

# Polymarket (herd leader)
polymarket:
  api_url: "https://clob.polymarket.com"
  gamma_url: "https://gamma-api.polymarket.com"
  poll_interval_sec: 10.0        # How often to refresh events

# Futures data
futures:
  provider: yahoo                # yahoo | alpaca | polygon
  symbols:
    - "ES=F"                     # S&P 500 E-mini
    - "NQ=F"                     # Nasdaq 100 E-mini
    - "YM=F"                     # Dow E-mini
    - "CL=F"                     # Crude Oil
    - "GC=F"                     # Gold
    - "BTC-USD"                  # Bitcoin
  # alpaca_api_key: ""           # Only if provider=alpaca
  # alpaca_secret: ""
  # polygon_api_key: ""          # Only if provider=polygon

# Options data
options:
  provider: yahoo                # yahoo | tradier
  vix_symbol: "^VIX"
  spy_symbol: "SPY"
  chain_expiry_days: 7
  # tradier_token: ""            # Only if provider=tradier

# Signal weights and thresholds
signals:
  # Technical indicator periods
  rsi_period: 14
  rsi_overbought: 70.0
  rsi_oversold: 30.0
  bb_period: 20
  bb_std: 2.0
  vwap_lookback_minutes: 60
  ema_fast: 9
  ema_slow: 21
  macd_signal: 9
  atr_period: 14

  # Signal source weights (must sum to ~1.0)
  weight_futures_momentum: 0.20
  weight_futures_mean_rev: 0.10
  weight_options_ivol: 0.15
  weight_options_skew: 0.10
  weight_polymarket_herd: 0.20
  weight_technical_rsi: 0.10
  weight_technical_vwap: 0.08
  weight_technical_bb: 0.07

  # Betting thresholds
  min_confidence: 0.60           # Minimum confidence to place a bet
  strong_confidence: 0.75        # Confidence for increased sizing

# Risk management
risk:
  max_daily_loss_usd: 100.0      # Stop trading after this daily loss
  max_single_bet_usd: 25.0       # Max per-bet exposure
  max_open_positions: 5           # Max concurrent bets
  max_daily_bets: 30              # Max bets per day
  default_bet_usd: 10.0           # Normal bet size
  strong_bet_usd: 20.0            # Bet size for high-confidence signals
  kelly_fraction: 0.25            # Quarter-Kelly (conservative)
  min_edge_pct: 3.0               # Minimum edge to bet (%)
  cooldown_after_loss_sec: 120.0  # Cooldown after 3+ consecutive losses

# Event targeting
target_event_types:
  - "INXD"                       # S&P 500 above/below
  - "NASDAQ"                     # Nasdaq above/below
  - "INX"                        # S&P 500 close price
  - "COMP"                       # Nasdaq close price

event_duration_minutes: 15
scan_interval_sec: 30.0
log_level: INFO
data_dir: kalshiv2_data
